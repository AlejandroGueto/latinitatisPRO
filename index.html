<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latinitatis PRO | Bibliotheca Magna v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+Display:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --marble: #FDFCF8; --terracotta: #8B322C; --gold: #C5A059; --ink: #1A1A1A; }
        body { font-family: 'Noto Serif Display', serif; background-color: var(--marble); color: var(--ink); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); }
        .ancient { font-family: 'Cinzel', serif; letter-spacing: 0.05em; }
        .greek-display { font-family: 'Playfair Display', serif; }
        
        .word-token { display: inline-block; padding: 0 4px; cursor: pointer; transition: all 0.2s; border-radius: 4px; position: relative; }
        .word-token:hover { color: var(--terracotta); background: rgba(139, 50, 44, 0.05); }
        .reading-now { background: var(--gold) !important; color: white !important; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4); transform: scale(1.15); z-index: 10; }

        .drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .trans-card { background: white; padding: 1.5rem; border-radius: 1rem; border-top: 4px solid var(--terracotta); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Barra de progreso estilo Audible */
        .progress-container { width: 100%; background: #e5e5e5; border-radius: 8px; height: 6px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s linear; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-20">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
            <div class="w-10 h-10 bg-stone-900 text-gold rounded-lg flex items-center justify-center font-bold shadow-xl">ΑΩ</div>
            <h1 class="ancient text-lg font-black text-stone-800 uppercase hidden md:block tracking-tighter">Latinitatis <span class="text-red-800">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openDictionary()" class="flex items-center gap-2 px-4 py-2 bg-stone-100 hover:bg-stone-200 rounded-full transition-all text-stone-700">
                <i data-lucide="search" class="w-4 h-4"></i><span class="ancient text-[10px] font-bold uppercase hidden md:inline">Diccionario</span>
            </button>
            <button onclick="toggleSidebar(true)" class="flex items-center gap-2 px-4 py-2 bg-stone-900 text-white hover:bg-stone-800 rounded-full transition-all">
                <i data-lucide="book-open" class="w-4 h-4"></i><span class="ancient text-[10px] font-bold uppercase">Bibliotheca</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 p-4 md:p-8 max-w-6xl mx-auto w-full">
        <header class="text-center mb-8">
            <h2 id="view-title" class="greek-display text-4xl md:text-5xl font-black text-stone-900 italic mb-2">Cargando...</h2>
            <p id="view-meta" class="text-red-800 ancient text-[10px] uppercase tracking-[0.3em] font-bold"></p>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 bg-white rounded-[30px] shadow-xl border border-stone-100 p-8 md:p-12 relative min-h-[400px]">
                <div id="greek-container" class="greek-display text-2xl md:text-3xl leading-[2.2] text-justify text-stone-800 transition-all duration-500"></div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-stone-900 text-white p-8 rounded-[30px] shadow-2xl relative">
                    <h3 class="ancient text-gold text-[10px] mb-4 uppercase tracking-widest font-bold flex justify-between items-center">
                        <span>Lector Sincronizado</span>
                        <span id="time-est" class="text-stone-400">00:00</span>
                    </h3>
                    
                    <div class="mb-6">
                        <div class="flex justify-between text-[10px] text-stone-400 font-mono mb-1">
                            <span id="word-progress">0%</span>
                            <span>100%</span>
                        </div>
                        <div class="progress-container"><div id="progress-fill" class="progress-bar"></div></div>
                    </div>

                    <div class="flex items-center justify-between bg-white/10 p-3 rounded-2xl mb-4">
                        <button onclick="changeSpeed(-0.1)" class="w-10 h-10 hover:bg-white/10 rounded-full">-</button>
                        <span id="speed-label" class="ancient text-xs font-bold text-gold">0.8x</span>
                        <button onclick="changeSpeed(0.1)" class="w-10 h-10 hover:bg-white/10 rounded-full">+</button>
                    </div>
                    
                    <div class="flex gap-2">
                        <button onclick="toggleAudio()" id="play-btn" class="flex-1 py-4 bg-white text-stone-900 rounded-xl ancient font-black uppercase text-xs hover:bg-gold hover:text-white transition-all shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="play" id="play-icon"></i> <span id="btn-text">Leer</span>
                        </button>
                        <button onclick="stopAudio(true)" class="p-4 bg-white/10 text-white rounded-xl hover:bg-red-800 transition-all" title="Detener y rebobinar">
                            <i data-lucide="square"></i>
                        </button>
                    </div>

                    <button onclick="toggleTranslations()" class="w-full mt-4 py-3 border border-stone-600 text-stone-300 rounded-xl ancient font-bold uppercase text-[10px] hover:bg-white/10 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="languages" class="w-4 h-4"></i> Comparativa Académica
                    </button>
                </div>
            </div>
        </section>

        <div id="trans-grid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10 animate-in slide-in-from-bottom-8"></div>
    </main>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-full md:w-96 bg-white shadow-2xl z-[100] -translate-x-full drawer p-8 border-r overflow-y-auto">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h2 class="ancient text-xl font-black">CANON <span class="text-red-800">GREEK</span></h2>
            <button onclick="toggleSidebar(false)" class="p-2 hover:bg-stone-100 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="author-list" class="space-y-6"></div>
    </div>

    <div id="oracle-drawer" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[100] translate-x-full drawer p-10 overflow-y-auto border-l">
        <button onclick="closeOracle()" class="mb-8 text-stone-400 hover:text-red-800 flex items-center gap-2 ancient text-[10px] uppercase font-bold tracking-widest"><i data-lucide="arrow-left"></i> Cerrar</button>
        <div id="oracle-content"></div>
    </div>

    <script>
        // EL CANON DE LOS 14 AUTORES (Estructura lista. Textos cortos para no colapsar el HTML. Puedes pegar textos largos luego).
        const canon = [
            { author: "Homero", works: [
                { title: "Ilíada", meta: "Canto I, 1-7", content: "μῆνιν ἄειδε θεὰ Πηληϊάδεω Ἀχιλῆος οὐλομένην, ἣ μυρί᾽ Ἀχαιοῖς ἄλγε᾽ ἔθηκε, πολλὰς δ᾽ ἰφθίμους ψυχὰς Ἄϊδι προΐαψεν ἡρώων, αὐτοὺς δὲ ἑλώρια τεῦχε κύνεσσιν οἰωνοῖσί τε πᾶσι, Διὸς δ᾽ ἐτελείετο βουλή.", translations: [{ lang: "ES (Gredos)", text: "Canta, oh diosa, la cólera del Pelida Aquiles; cólera funesta...", author: "E. Crespo" }, { lang: "EN (Oxford)", text: "Sing, goddess, the anger of Peleus' son Achilles...", author: "R. Lattimore" }] },
                { title: "Odisea", meta: "Canto I, 1-5", content: "Ἄνδρα μοι ἔννεπε, μοῦσα, πολύτροπον, ὃς μάλα πολλὰ πλάγχθη, ἐπεὶ Τροίης ἱερὸν πτολίεθρον ἔπερσε.", translations: [{ lang: "ES (Gredos)", text: "Háblame, Musa, de aquel varón de multiforme ingenio...", author: "J.M. Pabón" }] }
            ]},
            { author: "Hesíodo", works: [
                { title: "Teogonía", meta: "1-4", content: "Μουσάων Ἑλικωνιάδων ἀρχώμεθ᾽ ἀείδειν, αἵ θ᾽ Ἑλικῶνος ἔχουσιν ὄρος μέγα τε ζάθεόν τε.", translations: [{ lang: "ES (Gredos)", text: "Comencemos nuestro canto por las Musas Heliconíadas...", author: "Pérez Jiménez" }] },
                { title: "Trabajos y Días", meta: "1-4", content: "Μοῦσαι Πιερίηθεν ἀοιδῇσι κλείουσαι δεῦτε, Δί᾽ ἐννέπετε, σφέτερον πατέρ᾽ ὑμνείουσαι.", translations: [] }
            ]},
            { author: "Safo", works: [
                { title: "Himno a Afrodita", meta: "Fr. 1", content: "Ποικιλόθρον᾽ ἀθάνατ᾽ Ἀφρόδιτα, παῖ Δίος δολόπλοκε, λίσσομαί σε.", translations: [{ lang: "ES (Gual)", text: "Inmortal Afrodita la de trono pintado, hija de Zeus...", author: "C. García Gual" }] },
                { title: "Fragmento 31", meta: "Fr. 31", content: "Φαίνεταί μοι κῆνος ἴσος θέοισιν ἔμμεν᾽ ὤνηρ, ὄστις ἐνάντιός τοι ἰζάνει.", translations: [] }
            ]},
            { author: "Tucídides", works: [ { title: "Historia", meta: "I, 1", content: "Θουκυδίδης Ἀθηναῖος ξυνέγραψε τὸν πόλεμον τῶν Πελοποννησίων καὶ Ἀθηναίων.", translations: [] }, { title: "Epitafio", meta: "II, 35", content: "Οἱ μὲν πολλοὶ τῶν ἐνθάδε εἰρηκότων ἤδη ἐπαινοῦσι τὸν προσθέντα.", translations: [] } ]},
            { author: "Heródoto", works: [ { title: "Historias", meta: "Proemio", content: "Ἡροδότου Ἁλικαρνησσέος ἱστορίης ἀπόδεξις ἥδε, ὡς μήτε τὰ γενόμενα ἐξ ἀνθρώπων.", translations: [] }, { title: "Libro II", meta: "Egipto", content: "Ἔρχομαι δὲ περὶ Αἰγύπτου μηκυνέων τὸν λόγον.", translations: [] } ]},
            { author: "Sófocles", works: [ { title: "Edipo Rey", meta: "1-5", content: "Ὦ τέκνα, Κάδμου τοῦ πάλαι νέα τροφή, τίνας ποθ᾽ ἑδρας τάσδε μοι θοάζετε.", translations: [{ lang: "ES (Gredos)", text: "¡Oh hijos, nueva descendencia del antiguo Cadmo!...", author: "A. Alamillo" }] }, { title: "Antígona", meta: "1-5", content: "Ὦ κοινὸν αὐτάδελφον Ἰσμήνης κάρα, ἆρ᾽ οἶσθ᾽ ὅτι Ζεὺς.", translations: [] } ]},
            { author: "Eurípides", works: [ { title: "Medea", meta: "1-5", content: "Εἴθ᾽ ὤφελ᾽ Ἀργοῦς μὴ διαπτάσθαι σκάφος Κόλχων ἐς αἶαν.", translations: [] }, { title: "Bacantes", meta: "1-5", content: "Ἥκω Διὸς παῖς τήνδε Θηβαίων χθόνα Διόνυσος.", translations: [] } ]},
            { author: "Aristófanes", works: [ { title: "Lisístrata", meta: "1-5", content: "Ἀλλ᾽ εἴ τις ἐς Βακχεῖον αὐτὰς ἐκάλεσεν, ἢ ᾽ς Πανὸς.", translations: [] }, { title: "Las Nubes", meta: "1-5", content: "Ἰοὺ ἰού· ὦ Ζεῦ βασιλεῦ, τὸ χρῆμα τῶν νυκτῶν ὅσον.", translations: [] } ]},
            { author: "Platón", works: [ { title: "Apología", meta: "17a", content: "Ὅτι μὲν ὑμεῖς, ὦ ἄνδρες Ἀθηναῖοι, πεπόνθατε ὑπὸ τῶν ἐμῶν κατηγόρων, οὐκ οἶδα.", translations: [] }, { title: "Banquete", meta: "172a", content: "Δοκῶ μοι περὶ ὧν πυνθάνεσθε οὐκ ἀμελέτητος εἶναι.", translations: [] } ]},
            { author: "Aristóteles", works: [ { title: "Metafísica", meta: "I, 1", content: "Πάντες ἄνθρωποι τοῦ εἰδέναι ὀρέγονται φύσει. Σημεῖον δ᾽ ἡ τῶν αἰσθήσεων ἀγάπησις.", translations: [] }, { title: "Ética", meta: "I, 1", content: "Πᾶσα τέχνη καὶ πᾶσα μέθοδος, ὁμοίως δὲ πρᾶξίς τε καὶ προαίρεσις.", translations: [] } ]},
            { author: "Demóstenes", works: [ { title: "Sobre la Corona", meta: "1", content: "Πρῶτον μέν, ὦ ἄνδρες Ἀθηναῖοι, τοῖς θεοῖς εὔχομαι πᾶσι καὶ πάσαις.", translations: [] }, { title: "Filípica I", meta: "1", content: "Εἰ μὲν περὶ καινοῦ τινὸς πράγματος προυτίθετ᾽, ὦ ἄνδρες Ἀθηναῖοι.", translations: [] } ]},
            { author: "Píndaro", works: [ { title: "Olímpica I", meta: "1-5", content: "Ἄριστον μὲν ὕδωρ, ὁ δὲ χρυσὸς αἰθόμενον πῦρ ἅτε διαπρέπει νυκτὶ.", translations: [] }, { title: "Pítica I", meta: "1-5", content: "Χρυσέα φόρμιγξ, Ἀπόλλωνος καὶ ἰοπλοκάμων σύνδικον Μοισᾶν κτέανον.", translations: [] } ]},
            { author: "Estrabón", works: [ { title: "Geografía", meta: "I, 1", content: "Τῆς τοῦ φιλοσόφου πραγματείας εἶναι νομίζομεν, εἴπερ τινὰ ἄλλην.", translations: [] }, { title: "Iberia", meta: "III, 1", content: "Μετὰ δὲ τὴν προεκτεθεῖσαν χωρογραφίαν τῆς Εὐρώπης, ἐφεξῆς ἐστιν ἡ περὶ τῆς Ἰβηρίας λέγειν.", translations: [] } ]},
            { author: "Marco Aurelio", works: [ { title: "Meditaciones", meta: "II, 1", content: "Ἕωθεν προλέγειν ἑαυτῷ· συντεύξομαι περιέργῳ, ἀχαρίστῳ, ὑβριστῇ, δολερῷ, βασκάνῳ, ἀκοινωνήτῳ.", translations: [] }, { title: "Libro IV", meta: "4", content: "Εἰ τὸ νοερὸν ἡμῖν κοινόν, καὶ ὁ λόγος, καθ᾽ ὃν λογικοί ἐσμεν, κοινός.", translations: [] } ]}
        ];

        let synth = window.speechSynthesis, utterance = null, readingRate = 0.8, isReading = false, isPaused = false, currentWork = null, totalWords = 0;

        window.onload = () => { lucide.createIcons(); renderLibrary(); loadWork(0, 0); };

        function renderLibrary() {
            document.getElementById('author-list').innerHTML = canon.map((a, ai) => `
                <div class="mb-4">
                    <h3 class="ancient text-red-800 text-[9px] font-black uppercase tracking-widest border-b pb-1 mb-1">${a.author}</h3>
                    <div class="space-y-1">
                        ${a.works.map((w, wi) => `
                            <button onclick="loadWork(${ai}, ${wi})" class="w-full text-left py-1.5 px-2 rounded hover:bg-stone-100 font-serif text-sm text-stone-700 transition-all flex justify-between group">
                                <span>${w.title}</span><i data-lucide="chevron-right" class="w-3 h-3 opacity-0 group-hover:opacity-100"></i>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function loadWork(ai, wi) {
            currentWork = canon[ai].works[wi]; currentWork.author = canon[ai].author;
            document.getElementById('view-title').innerText = currentWork.title;
            document.getElementById('view-meta').innerText = `${currentWork.author} • ${currentWork.meta}`;
            document.getElementById('trans-grid').classList.add('hidden');
            
            const words = currentWork.content.split(' ');
            totalWords = words.length;
            
            // Tiempo estimado basado en velocidad de lectura (aprox 120 palabras/min)
            const minutes = Math.ceil(totalWords / (120 * readingRate));
            document.getElementById('time-est').innerText = `~${minutes} min`;
            
            document.getElementById('greek-container').innerHTML = words.map((word, i) => `
                <span class="word-token" id="token-${i}" onclick="analyze('${word.replace(/[.,·;:]/g,'')}')">${word}</span>
            `).join(' ');
            
            toggleSidebar(false); stopAudio(true);
        }

        // --- CONTROLES AUDIBLE ---
        function toggleAudio() {
            if (isReading && !isPaused) { synth.pause(); isPaused = true; updateUI(false, true); }
            else if (isReading && isPaused) { synth.resume(); isPaused = false; updateUI(true, false); }
            else { startAudio(); }
        }

        function startAudio() {
            synth.cancel(); isReading = true; isPaused = false; updateUI(true, false);
            utterance = new SpeechSynthesisUtterance(currentWork.content);
            utterance.lang = 'el-GR'; utterance.rate = readingRate;

            let wordCounter = 0;
            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    document.querySelectorAll('.word-token').forEach(el => el.classList.remove('reading-now'));
                    const currentToken = document.getElementById(`token-${wordCounter}`);
                    if (currentToken) {
                        currentToken.classList.add('reading-now');
                        currentToken.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    
                    // Actualizar barra de progreso estilo Kindle
                    let pct = Math.min(100, Math.round((wordCounter / totalWords) * 100));
                    document.getElementById('progress-fill').style.width = `${pct}%`;
                    document.getElementById('word-progress').innerText = `${pct}%`;
                    
                    wordCounter++;
                }
            };
            utterance.onend = () => stopAudio(true);
            synth.speak(utterance);
        }

        function stopAudio(reset = false) {
            synth.cancel(); isReading = false; isPaused = false;
            updateUI(false, false);
            document.querySelectorAll('.word-token').forEach(el => el.classList.remove('reading-now'));
            if(reset) {
                document.getElementById('progress-fill').style.width = '0%';
                document.getElementById('word-progress').innerText = '0%';
            }
        }

        function updateUI(playing, paused) {
            const icon = document.getElementById('play-icon');
            const text = document.getElementById('btn-text');
            if (playing) { icon.setAttribute('data-lucide', 'pause'); text.innerText = 'Pausar'; }
            else if (paused) { icon.setAttribute('data-lucide', 'play'); text.innerText = 'Reanudar'; }
            else { icon.setAttribute('data-lucide', 'play'); text.innerText = 'Leer'; }
            lucide.createIcons();
        }

        function changeSpeed(delta) { 
            readingRate = Math.min(1.5, Math.max(0.4, readingRate + delta)); 
            document.getElementById('speed-label').innerText = readingRate.toFixed(1) + 'x';
            loadWork(canon.findIndex(a => a.author === currentWork.author), canon.find(a => a.author === currentWork.author).works.findIndex(w => w.title === currentWork.title)); // Recalcula tiempo
        }

        // --- SISTEMA DE TRADUCCIONES ---
        function toggleTranslations() {
            const grid = document.getElementById('trans-grid');
            grid.classList.toggle('hidden');
            if (!currentWork.translations || currentWork.translations.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center p-8 text-stone-400 italic">No hay traducciones académicas para este pasaje. Usa el Diccionario para ayuda.</div>`;
                return;
            }
            grid.innerHTML = currentWork.translations.map(t => `
                <div class="trans-card"><p class="text-[10px] ancient uppercase font-bold text-gold tracking-widest mb-3">${t.lang}</p><p class="text-lg italic text-stone-800 font-serif text-justify">"${t.text}"</p><p class="mt-4 text-[9px] text-stone-400 font-bold uppercase text-right">— ${t.author}</p></div>
            `).join('');
            if(!grid.classList.contains('hidden')) grid.scrollIntoView({ behavior: 'smooth' });
        }

        // --- EL NUEVO DICCIONARIO UNIVERSAL (Vía Oráculo) ---
        function openDictionary() {
            const drawer = document.getElementById('oracle-drawer');
            const content = document.getElementById('oracle-content');
            drawer.classList.remove('translate-x-full');
            
            content.innerHTML = `
                <div class="mb-6">
                    <h3 class="ancient text-xl font-black mb-2 flex items-center gap-2"><i data-lucide="book-open"></i> Lexicon Liddell-Scott</h3>
                    <p class="text-xs text-stone-500 mb-4">Busca cualquier palabra griega para obtener su definición de diccionario clásico.</p>
                    <div class="flex gap-2">
                        <input type="text" id="dic-input" placeholder="Ej: λόγος" class="flex-1 p-3 border rounded-lg greek-display text-xl focus:outline-none focus:border-gold">
                        <button onclick="searchDictionary()" class="p-3 bg-stone-900 text-white rounded-lg hover:bg-gold transition-colors"><i data-lucide="search"></i></button>
                    </div>
                </div>
                <div id="dic-results" class="space-y-4"></div>
            `;
            lucide.createIcons();
            document.getElementById('dic-input').focus();
        }

        async function searchDictionary(word = null) {
            const searchTerm = word || document.getElementById('dic-input').value;
            if(!searchTerm) return;
            
            const resultsDiv = document.getElementById('dic-results');
            resultsDiv.innerHTML = `<div class="py-10 text-center animate-pulse ancient text-stone-400">Consultando los volúmenes...</div>`;

            let apiKey = localStorage.getItem('gemini_key');
            if (!apiKey) {
                apiKey = prompt("🏛️ Pega tu Clave API de Google AI Studio:");
                if (apiKey) localStorage.setItem('gemini_key', apiKey.trim()); else return;
            }

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
                const prompt = `Actúa como el Diccionario Liddell-Scott-Jones de Griego Antiguo. Define la palabra "${searchTerm}". Devuelve JSON estricto: {"lema":"palabra en griego","transliteracion":"","significados":["1. x", "2. y"],"etimologia":"","ejemplo_uso":""}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                
                const data = await response.json();
                const res = JSON.parse(data.candidates[0].content.parts[0].text);

                resultsDiv.innerHTML = `
                    <div class="border-t pt-6">
                        <h3 class="greek-display text-4xl mb-1 text-stone-900">${res.lema}</h3>
                        <p class="text-stone-400 italic mb-6">[${res.transliteracion}]</p>
                        
                        <div class="space-y-4">
                            <div class="bg-stone-50 p-5 rounded-xl border border-stone-200">
                                <p class="ancient text-[9px] text-red-800 uppercase font-bold mb-3">Definiciones (LSJ)</p>
                                <ul class="list-disc list-inside space-y-2 text-stone-800 font-serif">${res.significados.map(s => `<li>${s}</li>`).join('')}</ul>
                            </div>
                            
                            <div>
