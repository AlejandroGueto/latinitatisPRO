<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Latinitatis Pro | El Santuario de los Clásicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+Display:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --marble: #FDFCF8; --terracotta: #8B322C; --gold: #C5A059; --ink: #1A1A1A; }
        body { font-family: 'Noto Serif Display', serif; background-color: var(--marble); color: var(--ink); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); overflow-x: hidden; }
        .ancient { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        .greek-display { font-family: 'Playfair Display', serif; }
        .word-token { display: inline-block; padding: 2px 5px; cursor: pointer; transition: all 0.3s; border-radius: 8px; }
        .word-token:hover { color: var(--terracotta); background: rgba(139, 50, 44, 0.05); }
        .active-word { color: var(--terracotta) !important; font-weight: 700; background: rgba(139, 50, 44, 0.08); box-shadow: 0 4px 0 var(--gold); }
        .drawer { transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        .trans-card { background: white; padding: 1.5rem; border-radius: 2rem; border-top: 4px solid var(--terracotta); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-stone-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4 cursor-pointer" onclick="resetApp()">
            <div class="w-10 h-10 bg-stone-900 text-white rounded-lg flex items-center justify-center font-bold shadow-xl">Λ</div>
            <h1 class="ancient text-lg font-black text-stone-800 uppercase">Latinitatis <span class="text-red-800 font-normal">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleIndex()" class="p-2.5 bg-stone-50 rounded-full"><i data-lucide="book-open"></i></button>
            <button onclick="toggleView('library')" class="p-2.5 bg-stone-50 rounded-full"><i data-lucide="library"></i></button>
            <button onclick="generateExercise()" class="p-2.5 bg-stone-900 text-white rounded-full hover:bg-red-800 transition-colors" title="Reto del Oráculo"><i data-lucide="brain-circuit"></i></button>
        </div>
    </nav>

    <main id="reader-view" class="flex-1 p-6 md:p-12 max-w-6xl mx-auto w-full">
        <header class="mb-10 text-center">
            <h2 id="view-title" class="greek-display text-5xl md:text-7xl font-black text-stone-900 italic leading-none">Iliada</h2>
            <p id="view-meta" class="text-stone-400 italic sans uppercase text-xs tracking-widest mt-4"></p>
        </header>

        <section class="bg-white/80 backdrop-blur-sm p-8 md:p-16 rounded-[48px] shadow-2xl border border-stone-100 relative">
            <div id="greek-container" class="greek-display text-3xl md:text-5xl leading-[1.8] text-center min-h-[150px]"></div>
            <div id="exercise-area" class="hidden mt-10 p-6 bg-stone-900 text-stone-100 rounded-3xl animate-in zoom-in-95"></div>
            <div class="mt-12 flex flex-wrap justify-center gap-4">
                <button onclick="playVoice()" class="flex items-center gap-3 px-8 py-4 bg-stone-900 text-white rounded-full ancient text-xs font-bold uppercase shadow-xl group">
                    <i data-lucide="volume-2" id="play-icon"></i> Recitación
                </button>
                <button onclick="getTrilingualComparison()" class="px-8 py-4 bg-red-800 text-white rounded-full ancient text-xs font-bold uppercase shadow-xl">
                    <i data-lucide="languages" class="inline mr-2"></i> Comparativa
                </button>
            </div>
            <div id="trans-grid" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6 mt-10"></div>
        </section>
    </main>

    <div id="drawer" class="fixed inset-y-0 right-0 w-full md:w-[480px] bg-white shadow-2xl z-[150] translate-x-full drawer p-10 overflow-y-auto">
        <button onclick="closeDrawer()" class="flex items-center gap-3 text-stone-300 hover:text-red-800 mb-8 font-black uppercase text-[10px]"><i data-lucide="arrow-left"></i> Regresar</button>
        <div id="drawer-content"></div>
    </div>

    <div id="index-drawer" class="fixed inset-y-0 left-0 w-full md:w-[400px] bg-white shadow-2xl z-[150] -translate-x-full drawer p-10 overflow-y-auto">
        <div id="index-content" class="space-y-8"></div>
    </div>

    <script>
        const parte1 = "AIzaSy";
        const parte2 = "C4Y-CvoE8y4w4B3Cdo76jED5yVl9ChvyY";
        const apiKey = parte1 + parte2;
        let currentPassage = null, activeMorphData = null;

        const classicalIndex = [
            { author: "Homero", works: [{ title: "Ilíada", meta: "I, 1-7", content: "μῆνιν ἄειδε θεὰ Πηληϊάδεω Ἀχιλῆος οὐλομένην, ἣ μυρί᾽ Ἀχαιοῖς ἄλγε᾽ ἔθηκε, πολλὰς δ᾽ ἰφθίμους ψυχὰς Ἄϊδι προΐαψεν ἡρώων...", translations: [{lang: "Literal", text: "La cólera canta, diosa, del Pelida Aquiles destructora..."}] }]},
            { author: "Tucídides", works: [{ title: "Guerra Peloponeso", meta: "I, 1", content: "Θουκυδίδης Ἀθηναῖος ξυνέγραψε τὸν πόλεμον τῶν Πελοποννησίων καὶ Ἀθηναίων...", translations: [{lang: "Literal", text: "Tucídides ateniense escribió la guerra..."}] }]},
            { author: "Aristófanes", works: [{ title: "Lisístrata", meta: "1-4", content: "Ἀλλ᾽ εἴ τις ἐς Βακχεῖον αὐτὰς ἐκάλεσεν, ἢ ᾽ς Πανὸς ἢ ᾽πὶ Κωλιάδ᾽ ἢ ᾽ς Γενετυλλíδος...", translations: [{lang: "Literal", text: "Si alguien al Baco las hubiera llamado..."}] }]}
        ];

        window.onload = () => { lucide.createIcons(); renderIndex(); resetApp(); };

        function renderIndex() {
            document.getElementById('index-content').innerHTML = classicalIndex.map((a, ai) => `
                <div><h3 class="ancient text-red-800 border-b mb-4">${a.author}</h3>
                ${a.works.map((w, wi) => `<button onclick="loadWork(${ai},${wi})" class="block w-full text-left p-2 hover:bg-red-50 rounded">${w.title}</button>`).join('')}</div>
            `).join('');
        }

        async function callOráculo(prompt, systemMsg = "") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const res = await fetch(url, { method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: systemMsg + "\n" + prompt }] }], generationConfig: { temperature: 0.1, responseMimeType: "application/json" } }) });
            const data = await res.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        async function analyzeWord(word, el) {
            document.querySelectorAll('.word-token').forEach(x => x.classList.remove('active-word')); el.classList.add('active-word');
            document.getElementById('drawer').classList.remove('translate-x-full');
            document.getElementById('drawer-content').innerHTML = "Cargando escolios...";
            try {
                const res = await callOráculo(`Analiza "${word}" en "${currentPassage.content}". Devuelve JSON: {"lema":"","morfologia":"","sintaxis":"","traduccion":"","etimologia":"herencia en español"}`);
                document.getElementById('drawer-content').innerHTML = `
                    <h3 class="greek-display text-5xl mb-6">${word}</h3>
                    <div class="space-y-6">
                        <p class="text-2xl font-bold border-b pb-2">${res.lema}</p>
                        <p class="italic text-stone-500">${res.morfologia}</p>
                        <div class="bg-red-50 p-4 rounded-2xl"><strong>Significado:</strong> ${res.traduccion}</div>
                        <div class="bg-stone-50 p-4 rounded-2xl text-sm italic"><strong>Huella en español:</strong> ${res.etimologia}</div>
                    </div>`;
            } catch (e) { document.getElementById('drawer-content').innerHTML = "Error Oráculo."; }
        }

        async function generateExercise() {
            const area = document.getElementById('exercise-area');
            area.classList.remove('hidden');
            area.innerHTML = "<p class='animate-pulse'>El Oráculo está preparando un reto...</p>";
            try {
                const res = await callOráculo(`Crea un ejercicio corto de este texto: "${currentPassage.content}". Devuelve JSON: {"pregunta":"","opciones":["","",""],"correcta":0}`);
                area.innerHTML = `
                    <p class="mb-4 font-bold text-lg">${res.pregunta}</p>
                    <div class="grid gap-2">
                        ${res.opciones.map((o, i) => `<button onclick="checkAnswer(${i},${res.correcta})" class="p-3 bg-stone-800 hover:bg-stone-700 rounded-xl text-left transition-colors">${o}</button>`).join('')}
                    </div>`;
            } catch (e) { area.innerHTML = "No se pudo generar el ejercicio."; }
        }

        function checkAnswer(i, correct) {
            if(i === correct) alert("¡Sapiens! Respuesta correcta.");
            else alert("Sigue intentándolo, alumno.");
            document.getElementById('exercise-area').classList.add('hidden');
        }

        function loadWork(ai, wi) { currentPassage = classicalIndex[ai].works[wi]; renderText(); toggleIndex(); }
        function renderText() { document.getElementById('view-title').innerText = currentPassage.title; document.getElementById('greek-container').innerHTML = currentPassage.content.split(' ').map(w => `<span class="word-token" onclick="analyzeWord('${w.replace(/[.,]/g,'')}', this)">${w}</span>`).join(' '); }
        function toggleIndex() { document.getElementById('index-drawer').classList.toggle('-translate-x-full'); }
        function resetApp() { currentPassage = classicalIndex[0].works[0]; renderText(); }
        function closeDrawer() { document.getElementById('drawer').classList.add('translate-x-full'); }
        function toggleView(v) { alert("Biblioteca guardada localmente."); }

        function playVoice() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(currentPassage.content);
                u.lang = 'el-GR'; u.rate = 0.8;
                window.speechSynthesis.speak(u);
            }
        }

        function getTrilingualComparison() {
            const grid = document.getElementById('trans-grid');
            grid.classList.toggle('hidden');
            grid.innerHTML = currentPassage.translations.map(t => `<div class="trans-card"><p class="text-sm uppercase font-bold text-red-800">${t.lang}</p><p class="italic">"${t.text}"</p></div>`).join('');
        }
    </script>
</body>
</html>
