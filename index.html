<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Latinitatis Pro | Bibliotheca Magna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Serif+Display:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --marble: #FDFCF8; --terracotta: #8B322C; --gold: #C5A059; --ink: #1A1A1A; }
        body { font-family: 'Noto Serif Display', serif; background-color: var(--marble); color: var(--ink); background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png'); overflow-x: hidden; }
        .ancient { font-family: 'Cinzel', serif; letter-spacing: 0.1em; }
        .greek-display { font-family: 'Playfair Display', serif; }
        .word-token { display: inline-block; padding: 2px 4px; cursor: pointer; transition: all 0.2s; border-radius: 4px; }
        .word-token:hover { background: rgba(139, 50, 44, 0.1); color: var(--terracotta); }
        .active-word { color: var(--terracotta) !important; font-weight: 700; background: rgba(139, 50, 44, 0.08); box-shadow: 0 2px 0 var(--gold); }
        .reading-now { background: var(--gold); color: white !important; border-radius: 4px; transform: scale(1.05); }
        .drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .trans-card { background: white; padding: 1.25rem; border-radius: 1.5rem; border-top: 3px solid var(--terracotta); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4 cursor-pointer" onclick="resetApp()">
            <div class="w-10 h-10 bg-stone-900 text-white rounded-lg flex items-center justify-center font-bold shadow-xl">Λ</div>
            <h1 class="ancient text-lg font-black text-stone-800 uppercase hidden md:block">Latinitatis <span class="text-red-800">PRO</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleIndex()" class="p-2.5 hover:bg-stone-100 rounded-full"><i data-lucide="book-open"></i></button>
            <button onclick="toggleNotes()" class="p-2.5 hover:bg-stone-100 rounded-full text-amber-600"><i data-lucide="scroll"></i></button>
            <button onclick="generateExercise()" class="p-2.5 bg-stone-900 text-white rounded-full hover:bg-red-800 transition-all"><i data-lucide="brain-circuit"></i></button>
        </div>
    </nav>

    <main id="reader-view" class="flex-1 p-4 md:p-12 max-w-5xl mx-auto w-full">
        <header class="mb-8 text-center">
            <h2 id="view-title" class="greek-display text-4xl md:text-6xl font-black text-stone-900 italic tracking-tight italic">Cargando...</h2>
            <p id="view-meta" class="text-stone-400 ancient text-[10px] mt-2 uppercase tracking-[0.2em]"></p>
        </header>

        <section class="bg-white rounded-[40px] shadow-2xl border border-stone-100 p-8 md:p-16 relative min-h-[400px]">
            <div id="greek-container" class="greek-display text-2xl md:text-4xl leading-[2] text-justify md:text-center transition-all duration-500"></div>
            
            <div class="mt-12 pt-8 border-t border-stone-50 flex flex-wrap justify-center items-center gap-6">
                <div class="flex items-center bg-stone-100 rounded-full px-4 py-2 gap-3">
                    <button onclick="changeSpeed(-0.1)" class="text-stone-400 hover:text-stone-900 text-xs font-bold">-</button>
                    <span id="speed-label" class="text-[10px] ancient font-bold w-12 text-center text-stone-600">0.8x</span>
                    <button onclick="changeSpeed(0.1)" class="text-stone-400 hover:text-stone-900 text-xs font-bold">+</button>
                </div>
                <button onclick="playVoice()" id="play-btn" class="flex items-center gap-3 px-10 py-4 bg-stone-900 text-white rounded-full ancient text-xs font-bold uppercase shadow-xl hover:bg-black transition-all">
                    <i data-lucide="play" id="play-icon"></i> Escuchar
                </button>
                <button onclick="toggleTranslations()" class="px-6 py-4 border-2 border-red-800 text-red-800 rounded-full ancient text-xs font-bold uppercase hover:bg-red-50 transition-all">Comparativa</button>
                <button onclick="saveNote()" class="p-4 border border-stone-200 rounded-full hover:bg-stone-50"><i data-lucide="bookmark"></i></button>
            </div>

            <div id="trans-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 mt-10 animate-in slide-in-from-bottom-4"></div>
            <div id="exercise-area" class="hidden mt-8 p-6 bg-stone-900 text-white rounded-3xl animate-in zoom-in-95"></div>
        </section>
    </main>

    <div id="notes-drawer" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl z-[200] translate-x-full drawer p-8 overflow-y-auto border-l border-stone-200">
        <div class="flex justify-between items-center mb-8"><h3 class="ancient text-xl font-bold">Mi Códice</h3><button onclick="toggleNotes()"><i data-lucide="x"></i></button></div>
        <div id="notes-list" class="space-y-4"></div>
    </div>

    <div id="drawer" class="fixed inset-y-0 right-0 w-full md:w-[480px] bg-white shadow-2xl z-[200] translate-x-full drawer p-10 overflow-y-auto">
        <button onclick="closeDrawer()" class="flex items-center gap-3 text-stone-300 hover:text-red-800 mb-8 font-black uppercase text-[10px]"><i data-lucide="arrow-left"></i> Regresar</button>
        <div id="drawer-content"></div>
    </div>

    <div id="index-drawer" class="fixed inset-y-0 left-0 w-full md:w-[400px] bg-white shadow-2xl z-[200] -translate-x-full drawer p-10 overflow-y-auto border-r border-stone-200">
        <div id="index-content" class="space-y-8"></div>
    </div>

    <script>
       let apiKey = localStorage.getItem('gemini_key');
if (!apiKey) {
    apiKey = prompt("🏛️ Para despertar al Oráculo, pega aquí tu Clave API de Google. Solo tendrás que hacerlo una vez y se guardará en tu navegador de forma segura:");
    if (apiKey) localStorage.setItem('gemini_key', apiKey.trim());
}
        let currentPassage = null, audioRate = 0.8, isSpeaking = false;

        const classicalIndex = [
            {
                author: "Homero",
                works: [
                    { 
                        title: "Ilíada", meta: "Canto I, 1-7", 
                        content: "μῆνιν ἄειδε θεὰ Πηληϊάδεω Ἀχιλῆος οὐλομένην, ἣ μυρί᾽ Ἀχαιοῖς ἄλγε᾽ ἔθηκε, πολλὰς δ᾽ ἰφθίμους ψυχὰς Ἄϊδι προΐαψεν ἡρώων, αὐτοὺς δὲ ἑλώρια τεῦχε κύνεσσιν οἰωνοῖσί τε πᾶσι, Διὸς δ᾽ ἐτελείετο βουλή, ἐξ οὗ δὴ τὰ πρῶτα διαστήτην ἐρίσαντε Ἀτρεΐδης τε ἄναξ ἀνδρῶν καὶ δῖος Ἀχιλλεύς.",
                        translations: [
                            { lang: "ES (Gredos)", text: "Canta, oh diosa, la cólera del Pelida Aquiles; cólera funesta que causó infinitos males...", author: "E. Crespo" },
                            { lang: "EN (Oxford)", text: "Sing, goddess, the anger of Peleus' son Achilles and its devastation...", author: "Lattimore" },
                            { lang: "FR (Belles Lettres)", text: "Chante, déesse, la colère d'Achille, le fils de Pélée; détestable colère...", author: "Mazon" }
                        ]
                    },
                    { title: "Odisea", meta: "Canto I, 1-10", content: "Ἄνδρα μοι ἔννεπε, μοῦσα, πολύτροπον, ὃς μάλα πολλὰ πλάγχθη, ἐπεὶ Τροίης ἱερὸν πτολίεθρον ἔπερσε· πολλῶν δ᾽ ἀνθρώπων ἴδεν ἄστεα καὶ νόον ἔγνω, πολλὰ δ᾽ ὅ γ᾽ ἐν πόντῳ πάθεν ἄλγεα ὃν κατὰ θυμόν, ἀρνύμενος ἥν τε ψυχὴν καὶ νόστον ἑταíρων.", translations: [{lang: "ES (Gredos)", text: "Háblame, Musa, de aquel varón de multiforme ingenio...", author: "J.M. Pabón"}] }
                ]
            },
            { author: "Demóstenes", works: [{ title: "Sobre la Corona", meta: "XVIII, 1", content: "Πρῶτον μέν, ὦ ἄνδρες Ἀθηναῖοι, τοῖς θεοῖς εὔχομαι πᾶσι καὶ πάσαις, ὅσην εὔνοιαν διατελῶ ἔχων ἐγώ τε τῇ πόλει καὶ πᾶσιν ὑμῖν, τοσαύτην ὑπάρξαι μοι παρ᾽ ὑμῶν εἰς τουτονὶ τὸν ἀγῶνα.", translations: [{lang: "ES (Gredos)", text: "En primer lugar, varones atenienses, ruego a todos los dioses...", author: "López Eire"}] }]},
            { author: "Estrabón", works: [{ title: "Geografía", meta: "I, 1.1", content: "Τῆς τοῦ φιλοσόφου πραγματείας εἶναι νομίζομεν, εἴπερ τινὰ ἄλλην, καὶ τὴν γεωγραφικήν, ἣν νῦν προῃρήμεθα ἐπισκοπεῖν.", translations: [{lang: "ES (Gredos)", text: "Consideramos que la ciencia geográfica pertenece al filósofo...", author: "García Ramón"}] }]},
            { author: "Tucídides", works: [{ title: "Guerra del Peloponeso", meta: "I, 1", content: "Θουκυδίδης Ἀθηναῖος ξυνέγραψε τὸν πόλεμον τῶν Πελοποννησίων καὶ Ἀθηναίων, ὡς ἐπολέμησαν πρὸς ἀλλήλους, ἀρξάμενος εὐθὺς καθισταμένου.", translations: [{lang: "ES (Gredos)", text: "Tucídides de Atenas escribió la historia de la guerra...", author: "J.J. Torres"}] }]},
            { author: "Heródoto", works: [{ title: "Historias", meta: "Proemio", content: "Ἡροδότου Ἁλικαρνησσέος ἱστορίης ἀπόδεξις ἥδε, ὡς μήτε τὰ γενόμενα ἐξ ἀνθρώπων τῷ χρόνῳ ἐξίτηλα γένηται, μήτε ἔργα μεγάλα τε καὶ θωμαστά.", translations: [{lang: "ES (Gredos)", text: "Esta es la exposición de las investigaciones de Heródoto...", author: "C. Schrader"}] }]},
            { author: "Sófocles", works: [{ title: "Edipo Rey", meta: "1-5", content: "Ὦ τέκνα, Κάδμου τοῦ πάλαι νέα τροφή, τίνας ποθ᾽ ἕδρας τάσδε μοι θοάζετε ἱκτηρίοις κλάδοισιν ἐξεστεμμένοι;", translations: [{lang: "ES (Gredos)", text: "¡Oh hijos, nueva descendencia del antiguo Cadmo!...", author: "A. Alamillo"}] }]},
            { author: "Eurípides", works: [{ title: "Medea", meta: "1-8", content: "Εἴθ᾽ ὤφελ᾽ Ἀργοῦς μὴ διαπτάσθαι σκάφος Κόλχων ἐς αἶαν κυανέας Συμπληγάδας, μηδ᾽ ἐν νάπαισι Πηλίου πεσεῖν ποτε.", translations: [{lang: "ES (Gredos)", text: "¡Ojalá la nave Argo no hubiera volado a la tierra de los colcos!", author: "A. Medina"}] }]},
            { author: "Aristófanes", works: [{ title: "Lisístrata", meta: "1-4", content: "Ἀλλ᾽ εἴ τις ἐς Βακχεῖον αὐτὰς ἐκάλεσεν, ἢ ᾽ς Πανὸς ἢ ᾽πὶ Κωλιάδ᾽ ἢ ᾽ς Γενετυλλίδος, οὐδ᾽ ἂν διελθεῖν ἦν ἂν ὑπὸ τῶν τυμπάνων.", translations: [{lang: "ES (Cátedra)", text: "¡Si alguien las hubiera invitado a una fiesta de Baco!", author: "Macía"}] }]},
            { author: "Safo", works: [{ title: "Himno a Afrodita", meta: "Fr. 1", content: "Ποικιλόθρον᾽ ἀθάνατ᾽ Ἀφρόδιτα, παῖ Δίος δολόπλοκε, λίσσομαί σε, μή μ᾽ ἄσαισι μηδ᾽ ὀνíαισι δáμνα, πότνια, θῦμον.", translations: [{lang: "ES (Gual)", text: "Inmortal Afrodita, la del trono pintado...", author: "C. García Gual"}] }]},
            { author: "Marco Aurelio", works: [{ title: "Meditaciones", meta: "II, 1", content: "Ἕωθεν προλέγειν ἑαυτῷ· συντεύξομαι περιέργῳ, ἀχαρίστῳ, ὑβριστῇ, δολερῷ, βασκάνῳ, ἀκοινωνήτῳ.", translations: [{lang: "ES (Gredos)", text: "Al amanecer, dite a ti mismo: me encontraré con un indiscreto...", author: "Díaz Tejera"}] }]},
            { author: "Flavio Josefo", works: [{ title: "Antigüedades Judías", meta: "I, 1", content: "Τοῖς τὰς ἱστορίας συγγράφειν βουλομένοις οὐ μίαν οὐδὲ τὴν αὐτὴν ὁρῶ τῆς σπουδῆς αἰτίαν, ἀλλὰ πολλὰς καὶ πλεῖστον ἀλλήλων διαφερούσας.", translations: [{lang: "ES (Gredos)", text: "Para aquellos que desean escribir historias...", author: "Varlet"}] }]},
            { author: "Platón", works: [{ title: "Apología de Sócrates", meta: "17a", content: "Ὅτι μὲν ὑμεῖς, ὦ ἄνδρες Ἀθηναῖοι, πεπόνθατε ὑπὸ τῶν ἐμῶν κατηγόρων, οὐκ οἶδα· ἐγὼ δ᾽ οὖν καὶ αὐτὸς ὑπ᾽ αὐτῶν ὀλίγου ἐμαυτοῦ ἐπελαθόμην.", translations: [{lang: "ES (Gredos)", text: "No sé, atenienses, la sensación que habéis experimentado...", author: "J. Calonge"}] }]},
            { author: "Hesíodo", works: [{ title: "Teogonía", meta: "1-4", content: "Μουσάων Ἑλικωνιάδων ἀρχώμεθ᾽ ἀείδειν, αἵ θ᾽ Ἑλικῶνος ἔχουσιν ὄρος μέγα τε ζάθεόν τε καί τε περὶ κρήνην ἰοειδέα πόσσ᾽ ἁπαλοῖσιν ὀρχεῦνται.", translations: [{lang: "ES (Gredos)", text: "Comencemos a cantar a las Musas heliconíadas...", author: "Pérez Jiménez"}] }]},
            { author: "Píndaro", works: [{ title: "Olímpica I", meta: "1-4", content: "Ἄριστον μὲν ὕδωρ, ὁ δὲ χρυσὸς αἰθόμενον πῦρ ἅτε διαπρέπει νυκτὶ μεγάνορος ἔξοχα πλούτου· εἰ δ᾽ ἄεθλα γαρύεν ἔλδεαι, φίλον ἦτορ.", translations: [{lang: "ES (Alianza)", text: "Lo mejor es el agua, y el oro, como fuego encendido...", author: "A. Bernabé"}] }]}
        ];

        window.onload = () => { lucide.createIcons(); renderIndex(); loadNotes(); resetApp(); };

        function renderIndex() {
            document.getElementById('index-content').innerHTML = classicalIndex.map((a, ai) => `
                <div class="mb-6"><h3 class="ancient text-red-800 border-b mb-3 font-bold uppercase text-[10px] tracking-widest">${a.author}</h3>
                ${a.works.map((w, wi) => `<button onclick="loadWork(${ai},${wi})" class="block w-full text-left p-3 hover:bg-red-50 rounded-xl font-bold text-stone-700 text-sm transition-all">${w.title}</button>`).join('')}</div>
            `).join('');
        }

        async function callOráculo(prompt) {
            // MODELO 1.5-FLASH PARA ESTABILIDAD TOTAL
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const res = await fetch(url, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.1, responseMimeType: "application/json" } }) 
            });
            const data = await res.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        async function analyzeWord(word, el) {
            document.querySelectorAll('.word-token').forEach(x => x.classList.remove('active-word')); el.classList.add('active-word');
            document.getElementById('drawer').classList.remove('translate-x-full');
            document.getElementById('drawer-content').innerHTML = "<div class='py-20 text-center animate-pulse ancient text-stone-300'>Consultando Escolios...</div>";
            try {
                const res = await callOráculo(`Analiza "${word}" en "${currentPassage.content}". Devuelve JSON: {"lema":"","morfologia":"","traduccion":"","etimologia":""}`);
                document.getElementById('drawer-content').innerHTML = `
                    <span class="text-[10px] ancient uppercase font-bold text-red-800 tracking-widest">Morphologia</span>
                    <h3 class="greek-display text-5xl my-6 text-stone-900">${word}</h3>
                    <div class="space-y-8">
                        <div><p class="text-3xl font-black text-stone-800">${res.lema}</p><p class="text-sm italic text-stone-400 font-serif">${res.morfologia}</p></div>
                        <div class="bg-red-50 p-8 rounded-[32px] border border-red-100 shadow-inner"><p class="text-4xl italic text-stone-900 font-black">"${res.traduccion}"</p></div>
                        <div class="p-6 bg-stone-50 rounded-2xl"><p class="text-[10px] ancient uppercase mb-2 text-stone-400 text-xs">Huella en Español</p><p class="text-sm text-stone-600 font-serif">${res.etimologia}</p></div>
                    </div>`;
            } catch (e) { document.getElementById('drawer-content').innerHTML = "Error Oráculo. Verifica tu Clave API."; }
        }

        function playVoice() {
            if (!('speechSynthesis' in window)) return;
            if (isSpeaking) { window.speechSynthesis.cancel(); isSpeaking = false; updatePlayBtn(false); return; }
            isSpeaking = true; updatePlayBtn(true);
            const utterance = new SpeechSynthesisUtterance(currentPassage.content);
            utterance.lang = 'el-GR'; utterance.rate = audioRate;
            const tokens = document.querySelectorAll('.word-token');
            utterance.onboundary = (event) => {
                let currentPos = 0;
                tokens.forEach(t => {
                    t.classList.remove('reading-now');
                    if (currentPos <= event.charIndex) t.classList.add('reading-now');
                    currentPos += t.innerText.length + 1;
                });
            };
            utterance.onend = () => { isSpeaking = false; updatePlayBtn(false); tokens.forEach(t => t.classList.remove('reading-now')); };
            window.speechSynthesis.speak(utterance);
        }

        function changeSpeed(delta) { audioRate = Math.max(0.4, Math.min(1.5, audioRate + delta)); document.getElementById('speed-label').innerText = audioRate.toFixed(1) + 'x'; if(isSpeaking) playVoice(); }
        function updatePlayBtn(active) { const icon = document.getElementById('play-icon'); icon.setAttribute('data-lucide', active ? 'square' : 'play'); lucide.createIcons(); }
        
        function toggleTranslations() {
            const grid = document.getElementById('trans-grid'); grid.classList.toggle('hidden');
            grid.innerHTML = currentPassage.translations.map(t => `<div class="trans-card"><p class="text-[10px] ancient uppercase font-bold text-red-800 tracking-widest mb-3">${t.lang}</p><p class="text-lg italic text-stone-800 font-serif">"${t.text}"</p>${t.author ? `<p class="mt-4 text-[9px] text-stone-400 font-bold uppercase">— ${t.author}</p>` : ''}</div>`).join('');
            if(!grid.classList.contains('hidden')) grid.scrollIntoView({ behavior: 'smooth' });
        }

        async function generateExercise() {
            const area = document.getElementById('exercise-area'); area.classList.remove('hidden'); area.innerHTML = "<p class='animate-pulse text-center text-xs uppercase ancient'>El Oráculo prepara un reto...</p>";
            try {
                const res = await callOráculo(`Crea un ejercicio corto de este texto: "${currentPassage.content}". Devuelve JSON: {"pregunta":"","opciones":["","",""],"correcta":0}`);
                area.innerHTML = `<p class="mb-4 font-bold text-lg">${res.pregunta}</p><div class="grid gap-2">${res.opciones.map((o, i) => `<button onclick="checkAnswer(${i},${res.correcta})" class="p-3 bg-stone-800 hover:bg-stone-700 rounded-xl text-left transition-colors">${o}</button>`).join('')}</div>`;
            } catch (e) { area.innerHTML = "No se pudo generar el ejercicio."; }
        }

        function checkAnswer(i, correct) {
            if(i === correct) alert("¡Sapiens! Respuesta correcta.");
            else alert("Sigue intentándolo, alumno.");
            document.getElementById('exercise-area').classList.add('hidden');
        }

        function saveNote() {
            const note = { author: currentPassage.author, title: currentPassage.title, date: new Date().toLocaleDateString() };
            let saved = JSON.parse(localStorage.getItem('latin_notes') || '[]');
            saved.unshift(note); localStorage.setItem('latin_notes', JSON.stringify(saved));
            loadNotes(); toggleNotes();
        }

        function loadNotes() {
            const saved = JSON.parse(localStorage.getItem('latin_notes') || '[]');
            document.getElementById('notes-list').innerHTML = saved.map((n, i) => `<div class="p-5 bg-stone-50 rounded-2xl border border-stone-200 group relative transition-all hover:bg-white hover:shadow-lg"><p class="text-[8px] ancient text-red-800 font-bold uppercase">${n.author}</p><p class="font-bold text-stone-800 my-1 font-serif">${n.title}</p><p class="text-[10px] text-stone-400 italic">${n.date}</p><button onclick="deleteNote(${i})" class="absolute top-4 right-4 text-stone-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size="14"></i></button></div>`).join('') || '<p class="text-stone-300 italic text-center py-10">Tu códice está vacío.</p>';
            lucide.createIcons();
        }

        function deleteNote(i) { let saved = JSON.parse(localStorage.getItem('latin_notes') || '[]'); saved.splice(i, 1); localStorage.setItem('latin_notes', JSON.stringify(saved)); loadNotes(); }
        function loadWork(ai, wi) { currentPassage = classicalIndex[ai].works[wi]; currentPassage.author = classicalIndex[ai].author; renderText(); toggleIndex(); document.getElementById('trans-grid').classList.add('hidden'); window.scrollTo(0,0); }
        function renderText() { 
            document.getElementById('view-title').innerText = currentPassage.title; 
            document.getElementById('view-meta').innerText = `${currentPassage.author} • ${currentPassage.meta}`;
            document.getElementById('greek-container').innerHTML = currentPassage.content.split(' ').map(w => `<span class="word-token" onclick="analyzeWord('${w.replace(/[.,·;:]/g,'')}', this)">${w}</span>`).join(' '); 
        }
        function toggleIndex() { document.getElementById('index-drawer').classList.toggle('-translate-x-full'); }
        function toggleNotes() { document.getElementById('notes-drawer').classList.toggle('translate-x-full'); }
        function resetApp() { currentPassage = classicalIndex[0].works[0]; currentPassage.author = "Homero"; renderText(); }
        function closeDrawer() { document.getElementById('drawer').classList.add('translate-x-full'); }
    </script>
</body>
</html>
